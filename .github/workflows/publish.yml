name: publish

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event.inputs.tag }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      tag:
        description: GitHub release tag to publish, for example v0.1.0
        required: true
        type: string

jobs:
  pypi:
    name: publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/matrixscroll/
    permissions:
      attestations: write
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag }}
    steps:
      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must exactly match vMAJOR.MINOR.PATCH, got: $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Download GitHub release artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.whl" \
            --pattern "*.tar.gz" \
            --dir dist
          if ! find dist -maxdepth 1 -name '*.whl' -print -quit | grep -q .; then
            echo "::error::No wheel artifact found on GitHub release $RELEASE_TAG" >&2
            exit 1
          fi
          if ! find dist -maxdepth 1 -name '*.tar.gz' -print -quit | grep -q .; then
            echo "::error::No source distribution found on GitHub release $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Check release artifacts
        run: |
          python -m pip install --upgrade pip 'twine==6.1.0'
          python -m twine check --strict dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist/
          attestations: true

      - name: Verify Glama PyPI pin
        run: python scripts/validate_glama_pypi.py
