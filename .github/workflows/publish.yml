name: publish

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      tag:
        description: GitHub release tag to publish, for example v0.1.0
        required: true
        default: v0.1.0
        type: string
  release:
    types: [published]

jobs:
  pypi:
    name: publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/matrixscroll
    permissions:
      attestations: write
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
    steps:
      - name: Validate release tag
        shell: bash
        run: |
          case "$RELEASE_TAG" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Release tag must look like v0.1.0, got: $RELEASE_TAG" >&2; exit 1 ;;
          esac

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Download GitHub release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.whl" \
            --pattern "*.tar.gz" \
            --dir dist
          test -n "$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)"

      - name: Check release artifacts
        run: |
          python -m pip install --upgrade pip twine
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist/
          attestations: true
