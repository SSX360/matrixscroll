name: provenance-gate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      enforce:
        description: Run Scroll Gate in enforce mode (blocks on unsigned commits)
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  scroll-gate:
    name: Scroll Gate (hosted)
    runs-on: ubuntu-latest
    env:
      SSX360_API_KEY: ${{ secrets.SSX360_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Matrix Scroll (includes ssx360 CLI)
        run: pip install -e .

      - name: Resolve gate mode
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.enforce }}" = "true" ]; then
            echo "mode=enforce" >> "$GITHUB_OUTPUT"
          else
            echo "mode=warn" >> "$GITHUB_OUTPUT"
          fi

      - name: Require SSX360 API key
        if: env.SSX360_API_KEY == ''
        run: |
          echo "SSX360_API_KEY secret is required for Scroll Gate v2." >&2
          echo "Community tier includes 100 CI verifications/day. Get a key at https://ssx360.com/signup" >&2
          exit 1

      - name: Resolve commit range
        id: range
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch envelope notes
        run: git fetch origin refs/notes/matrixscroll:refs/notes/matrixscroll || true

      - name: Hosted verify (warn mode)
        if: steps.gate.outputs.mode == 'warn'
        continue-on-error: true
        run: |
          set -euo pipefail
          ssx360 check \
            --hosted \
            --base "${{ steps.range.outputs.base }}" \
            --head "${{ steps.range.outputs.head }}" \
            --source notes \
            --summary-output provenance-summary.json
          {
            echo "## Matrix Scroll Scroll Gate v2 (hosted)"
            echo ""
            echo "**Mode:** warn — advisory; merge not blocked"
            echo "**CLI:** ssx360 check --hosted"
            echo "**Community tier:** 100 verifications/day — [ssx360.com/signup](https://ssx360.com/signup)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Hosted verify (enforce mode)
        if: steps.gate.outputs.mode == 'enforce'
        run: |
          set -euo pipefail
          ssx360 check \
            --hosted \
            --base "${{ steps.range.outputs.base }}" \
            --head "${{ steps.range.outputs.head }}" \
            --source notes \
            --summary-output provenance-summary.json

      - name: Upload provenance summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provenance-summary
          path: provenance-summary.json
          if-no-files-found: ignore
