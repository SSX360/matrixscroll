name: provenance-gate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      enforce:
        description: Run Scroll Gate in enforce mode (blocks on unsigned commits)
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  scroll-gate:
    name: Scroll Gate (hosted)
    runs-on: ubuntu-latest
    env:
      SSX360_API_KEY: ${{ secrets.SSX360_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve gate mode
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.enforce }}" = "true" ]; then
            echo "mode=enforce" >> "$GITHUB_OUTPUT"
          else
            echo "mode=warn" >> "$GITHUB_OUTPUT"
          fi

      - name: Require SSX360 API key
        if: env.SSX360_API_KEY == ''
        run: |
          echo "SSX360_API_KEY secret is required for Scroll Gate v2." >&2
          echo "Community tier includes 100 CI verifications/day. Get a key at https://ssx360.com/signup" >&2
          exit 1

      - name: Hosted verify (warn mode)
        if: steps.gate.outputs.mode == 'warn'
        continue-on-error: true
        run: |
          set -euo pipefail
          BASE="${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}"
          HEAD="${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}"
          curl -fsS -X POST "https://ssx360.com/api/v1/verify" \
            -H "Authorization: Bearer ${SSX360_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"base\":\"${BASE}\",\"head\":\"${HEAD}\",\"commits\":[]}" \
            | tee provenance-summary.json
          {
            echo "## Matrix Scroll Scroll Gate v2 (hosted)"
            echo ""
            echo "**Mode:** warn — advisory; merge not blocked"
            echo "**API:** ssx360.com/api/v1/verify"
            echo "**Community tier:** 100 verifications/day — [ssx360.com/signup](https://ssx360.com/signup)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Hosted verify (enforce mode)
        if: steps.gate.outputs.mode == 'enforce'
        run: |
          set -euo pipefail
          BASE="${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}"
          HEAD="${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}"
          RESP="$(curl -fsS -X POST "https://ssx360.com/api/v1/verify" \
            -H "Authorization: Bearer ${SSX360_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"base\":\"${BASE}\",\"head\":\"${HEAD}\",\"commits\":[]}")"
          echo "$RESP" | tee provenance-summary.json
          OK="$(echo "$RESP" | python -c 'import json,sys; print(json.load(sys.stdin).get("ok", False))')"
          if [ "$OK" != "True" ] && [ "$OK" != "true" ]; then
            echo "Scroll Gate enforce failed." >&2
            exit 1
          fi

      - name: Upload provenance summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provenance-summary
          path: provenance-summary.json
          if-no-files-found: ignore
