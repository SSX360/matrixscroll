name: ci-unit

permissions:
  contents: read

concurrency:
  group: ci-unit-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit:
    name: ubuntu · py3.11
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,mcp,pqc]"

      - name: Run unit tests
        run: python -m pytest -q

      - name: Smoke-test CLI
        shell: bash
        run: |
          matrixscroll status
          tmp=$(mktemp -d)
          export MATRIXSCROLL_HOME="$tmp"
          echo '{"release":"smoke"}' > "$tmp/in.json"
          matrixscroll sign "$tmp/in.json" > "$tmp/out.json"
          matrixscroll verify "$tmp/out.json"

  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
