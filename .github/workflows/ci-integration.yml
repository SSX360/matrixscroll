name: ci-integration

permissions:
  contents: read

concurrency:
  group: ci-integration-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  matrix:
    name: ${{ matrix.os }} · py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,mcp]"

      - name: Run unit tests
        run: python -m pytest -q

  scroll-gate-smoke:
    name: hosted Scroll Gate smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    env:
      SSX360_API_KEY: ${{ secrets.SSX360_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require SSX360 API key
        if: env.SSX360_API_KEY == ''
        run: |
          echo "SSX360_API_KEY secret is required for hosted integration tests." >&2
          echo "Community tier includes 100 CI verifications/day. Get a key at https://ssx360.com/signup" >&2
          exit 1

      - name: Hosted verify (warn mode)
        continue-on-error: true
        run: |
          set -euo pipefail
          BASE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"
          curl -fsS -X POST "https://ssx360.com/api/v1/verify" \
            -H "Authorization: Bearer ${SSX360_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"base\":\"${BASE}\",\"head\":\"${HEAD}\",\"commits\":[]}" \
            | tee provenance-summary.json

      - name: Upload provenance summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-provenance-summary
          path: provenance-summary.json
          if-no-files-found: ignore
