name: verify-manifest

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  vectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install liboqs for PQC tests
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build
      - run: pip install -e ".[dev,pqc]"
      - run: pytest tests/test_vectors.py tests/test_canonical_pqc.py -v
      - run: pytest tests/test_pqc.py tests/test_policy.py -v

  verify-signed-examples:
    runs-on: ubuntu-latest
    needs: vectors
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[pqc]"
      - name: Verify signed examples and conformance vector
        run: |
          matrixscroll verify vectors/valid_simple.json
          matrixscroll verify examples/agentic_ai_evidence_manifest.signed.json
          matrixscroll verify examples/commit-envelope.signed.json
          matrixscroll verify examples/release-manifest.signed.json

  scroll-gate-smoke:
    runs-on: ubuntu-latest
    needs: vectors
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/test_gate.py tests/test_policy.py -v
