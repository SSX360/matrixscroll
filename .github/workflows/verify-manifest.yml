name: verify-manifest

on:
  pull_request:
  push:
    branches: [main]

jobs:
  vectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/test_vectors.py -v

  verify-signed-vector:
    runs-on: ubuntu-latest
    needs: vectors
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Verify conformance vector
        run: |
          matrixscroll verify vectors/valid_simple.json
          test $? -eq 0
