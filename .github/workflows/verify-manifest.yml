name: verify-manifest

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  vectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/test_vectors.py -v

  verify-signed-examples:
    runs-on: ubuntu-latest
    needs: vectors
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Verify signed examples and conformance vector
        run: |
          matrixscroll verify vectors/valid_simple.json
          matrixscroll verify examples/agentic_ai_evidence_manifest.signed.json
          matrixscroll verify examples/commit-envelope.signed.json
          matrixscroll verify examples/release-manifest.signed.json

  scroll-gate-smoke:
    runs-on: ubuntu-latest
    needs: vectors
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/test_gate.py tests/test_policy.py -v

  verify-pr-envelopes:
    name: Scroll Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: scroll-gate-smoke
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect envelope notes
        id: notes
        run: |
          set -euo pipefail
          git fetch origin refs/notes/matrixscroll:refs/notes/matrixscroll || true
          if git show-ref --verify --quiet refs/notes/matrixscroll; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Warn when notes missing (soft gate)
        if: steps.notes.outputs.present != 'true' && vars.ENFORCE_PROVENANCE != 'true'
        run: |
          {
            echo "## Matrix Scroll provenance gate"
            echo ""
            echo "**Status:** warning — envelope notes not published"
            echo ""
            echo "Publish notes before merge when ready:"
            echo ""
            echo '```bash'
            echo "matrixscroll hook-install"
            echo "matrixscroll envelope-publish-notes --base origin/main --head HEAD"
            echo "git push origin refs/notes/matrixscroll"
            echo '```'
            echo ""
            echo "Set repository variable \`ENFORCE_PROVENANCE=true\` to hard-fail missing notes."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when notes missing (hard gate)
        if: steps.notes.outputs.present != 'true' && vars.ENFORCE_PROVENANCE == 'true'
        run: |
          echo "Envelope notes ref refs/notes/matrixscroll not found." >&2
          echo "Publish with matrixscroll envelope-publish-notes and push notes." >&2
          exit 1

      - name: Verify PR commit envelope range
        if: steps.notes.outputs.present == 'true'
        uses: SSX360/matrixscroll-verify-action@v1
        with:
          head-ref: ${{ github.event.pull_request.head.sha }}
          base-ref: ${{ github.event.pull_request.base.sha }}
          source: notes
          notes-ref: refs/notes/matrixscroll
          fetch-notes: "false"
          matrixscroll-version: "0.2.6"
          summary-output: provenance-summary.json

      - name: Upload provenance summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provenance-summary
          path: provenance-summary.json
          if-no-files-found: ignore
